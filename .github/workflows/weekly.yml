name: Cannabliss Weekly Update

on:
  schedule:
    - cron: "0 15 * * 5"  # Every Friday at 15:00 UTC (10:00 AM CDT / 9:00 AM CST)
  workflow_dispatch:       # Manual trigger
    inputs:
      mode:
        description: "Selection mode"
        required: false
        default: "random"
        type: choice
        options:
          - random
          - recent
      seed:
        description: "Random seed (optional, for reproducibility)"
        required: false
        type: string
      dry_run:
        description: "Dry run (1 = no Spotify writes)"
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      history_weeks:
        description: "Exclude tracks from last N runs"
        required: false
        default: "6"
        type: string
      max_tracks_per_artist:
        description: "Max tracks per primary artist"
        required: false
        default: "2"
        type: string
      fresh_days_1:
        description: "Freshness tier 1 days (weight 3)"
        required: false
        default: "30"
        type: string
      fresh_days_2:
        description: "Freshness tier 2 days (weight 2)"
        required: false
        default: "180"
        type: string
      evolve:
        description: "Enable evolutionary mode (1/0)"
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      candidates:
        description: "Number of evolutionary candidates"
        required: false
        default: "7"
        type: string

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Playlist Automation
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          PROFILE: "cannabliss"
          MASTER_PLAYLIST_ID: "47W5136lY5XazjWDHmfyxm"
          FRESH_PLAYLIST_ID: ""
          CANNABLISS_TARGET_PLAYLIST_ID: "3P9XkucRpg9Naz8cGyZOpW"
          CANNABLISS_HALL_OF_FAME_PLAYLIST_ID: "6rdvXMnttC3muaQICqpNmc"
          CANNABLISS_FEEDER_PLAYLIST_IDS: "6rdvXMnttC3muaQICqpNmc"
          CANNABLISS_TARGET_SIZE: "160"
          CANNABLISS_WEEKLY_INSERTIONS: "40"
          CANNABLISS_STATE_PATH: "data/cannabliss_state.json"
          CANNABLISS_USE_TOP_TRACKS: "1"
          CANNABLISS_USE_RECENTLY_PLAYED: "1"
          CANNABLISS_TOP_TRACKS_TERM: "short_term"
          CANNABLISS_TOP_TRACKS_LIMIT: "50"
          CANNABLISS_RECENTLY_PLAYED_LIMIT: "50"
          CANNABLISS_TOP_TRACKS_BOOST: "0.35"
          CANNABLISS_RECENTLY_PLAYED_BOOST: "0.25"
          PLAYLIST_CACHE_DIR: "data/cache/playlists"
          PLAYLIST_CACHE_TTL_HOURS: "12"
          FORCE_REFRESH: ${{ github.event_name == 'schedule' && '1' || '0' }}
          MODE: ${{ inputs.mode || 'random' }}
          COUNT: "100"
          DRY_RUN: ${{ inputs.dry_run || '0' }}
          SEED: ${{ inputs.seed || '' }}
          HISTORY_WEEKS: ${{ inputs.history_weeks || '6' }}
          MAX_TRACKS_PER_ARTIST: ${{ inputs.max_tracks_per_artist || '2' }}
          FRESH_DAYS_1: ${{ inputs.fresh_days_1 || '30' }}
          FRESH_DAYS_2: ${{ inputs.fresh_days_2 || '180' }}
          EVOLVE: ${{ inputs.evolve || '0' }}
          CANDIDATES: ${{ inputs.candidates || '7' }}
          SCORE_W_NOVELTY: "1.0"
          SCORE_W_DIVERSITY: "1.0"
          SCORE_W_COHESION: "1.0"
          SCORE_W_FRESHNESS: "0.5"
          EVOLVE_LOG_PATH: "data/evolve_log.jsonl"
          ARCHIVE_WINNER: "0"
        run: python -m src.main
