name: Fresh 100 Weekly Update

on:
  schedule:
    - cron: "0 9 * * 1"  # Every Monday at 9:00 AM UTC
  workflow_dispatch:       # Manual trigger
    inputs:
      mode:
        description: "Selection mode"
        required: false
        default: "random"
        type: choice
        options:
          - random
          - recent
      seed:
        description: "Random seed (optional, for reproducibility)"
        required: false
        type: string
      dry_run:
        description: "Dry run (1 = no Spotify writes)"
        required: false
        default: "0"
        type: choice
        options:
          - "0"
          - "1"
      history_weeks:
        description: "Exclude tracks from last N runs"
        required: false
        default: "6"
        type: string
      max_tracks_per_artist:
        description: "Max tracks per primary artist"
        required: false
        default: "2"
        type: string
      fresh_days_1:
        description: "Freshness tier 1 days (weight 3)"
        required: false
        default: "30"
        type: string
      fresh_days_2:
        description: "Freshness tier 2 days (weight 2)"
        required: false
        default: "180"
        type: string

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Fresh 100
        env:
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
          MASTER_PLAYLIST_ID: "3P9XkucRpg9Naz8cGyZOpW"
          FRESH_PLAYLIST_ID: "1h9wSgaNgFMTvt73qrgccn"
          MODE: ${{ inputs.mode || 'random' }}
          COUNT: "100"
          DRY_RUN: ${{ inputs.dry_run || '0' }}
          SEED: ${{ inputs.seed || '' }}
          HISTORY_WEEKS: ${{ inputs.history_weeks || '6' }}
          MAX_TRACKS_PER_ARTIST: ${{ inputs.max_tracks_per_artist || '2' }}
          FRESH_DAYS_1: ${{ inputs.fresh_days_1 || '30' }}
          FRESH_DAYS_2: ${{ inputs.fresh_days_2 || '180' }}
        run: python -m src.main
